<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Configurador Maestro - Auditoría Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
        :root { 
            --primary: #2c3e50; 
            --secondary: #3498db; 
            --accent: #27ae60; 
            --warning: #f39c12; 
            --danger: #e74c3c; 
            --bg: #f4f7f6; 
            --montacargas: #e67e22;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; scroll-behavior: smooth; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { color: var(--primary); text-align: center; margin-bottom: 10px; border-bottom: 2px solid #eee; padding-bottom: 10px; font-size: 1.5em; }
        .area-indicator { text-align: center; font-weight: bold; color: var(--secondary); text-transform: uppercase; margin-bottom: 15px; font-size: 0.8em; letter-spacing: 1px; }
        
        /* TABS RESPONSIVAS */
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; border-bottom: 2px solid #eee; overflow-x: auto; padding-bottom: 5px; -webkit-overflow-scrolling: touch; }
        .tab { padding: 10px 15px; cursor: pointer; border: none; background: none; font-weight: bold; color: #95a5a6; transition: 0.3s; white-space: nowrap; font-size: 0.85em; }
        .tab.active { color: var(--secondary); border-bottom: 3px solid var(--secondary); }

        .section { display: none; }
        .section.active { display: block; }
        
        .form-box { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 25px; border: 1px solid #e9ecef; }
        .form-editing { border: 2px solid var(--warning); background: #fffdf5; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
        .full-width { grid-column: 1 / -1; }
        label { display: block; font-size: 0.75em; font-weight: bold; margin-bottom: 4px; color: #34495e; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ced4da; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        
        .btn-action { width: 100%; padding: 12px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 8px; font-size: 0.9em; }
        .btn-green { background: var(--accent); }
        .btn-orange { background: var(--warning); }
        .btn-blue { background: var(--secondary); }
        .btn-outline { background: transparent; color: var(--secondary); border: 2px solid var(--secondary); }

        .resumen-puntos { background: var(--primary); color: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .total-badge { font-size: 1.4em; font-weight: bold; padding: 5px 12px; border-radius: 8px; background: rgba(255,255,255,0.1); border: 2px solid transparent; }
        .puntos-ok { border-color: var(--accent); color: #2ecc71; }
        .puntos-error { border-color: var(--danger); color: #ff7675; }

        /* MEJORA: Alineación de cabecera de sección */
        .seccion-header { 
            background: #edf2f7; 
            padding: 12px; 
            margin-top: 10px; 
            border-radius: 8px; 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            font-weight: bold; 
            color: var(--primary); 
            border-left: 5px solid var(--secondary); 
            font-size: 0.9em; 
            min-height: 24px; 
        }
        
        .seccion-contenido { display: none; margin-bottom: 15px; border: 1px solid #edf2f7; border-top: none; border-radius: 0 0 8px 8px; overflow-x: auto; }
        .seccion-contenido.active { display: block; }

        table { width: 100%; border-collapse: collapse; background: white; min-width: 450px; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #edf2f7; font-size: 0.85em; }
        th { background: #f8fafc; color: #64748b; text-transform: uppercase; font-size: 0.7em; }
        
        .col-pts { width: 45px; text-align: center; font-weight: bold; }
        .col-actions { width: 90px; text-align: right; white-space: nowrap; }

        .btn-icon { border: none; padding: 6px 8px; border-radius: 6px; cursor: pointer; color: white; font-size: 1.1em; }
        .edit-btn { background: var(--warning); margin-right: 4px; }
        .del-btn { background: var(--danger); }
        .tag-depto { font-size: 0.7em; background: #e2e8f0; color: #4a5568; padding: 2px 6px; border-radius: 4px; font-weight: bold; display: inline-block; margin-top: 4px; }

        /* ESTILOS DE LA PANTALLA DE BLOQUEO */
        #auth-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--primary); /* Usa el azul oscuro de tu tema */
            z-index: 9999; /* Asegura que esté por encima de todo */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .lock-box {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .lock-input {
            padding: 12px;
            border-radius: 8px;
            border: none;
            text-align: center;
            font-size: 1.1em;
            margin-bottom: 10px;
            width: 200px;
        }

        @media (max-width: 600px) {
            .container { padding: 10px; }
            h2 { font-size: 1.2em; }
            .grid-3 { grid-template-columns: 1fr; }
        }
    </style>

<style>
  #top-nav-bar{
    position: sticky;
    top: 0;
    z-index: 9999;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    padding: 8px 10px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(6px);
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }
  #top-nav-bar .btn-action{
    padding: 8px 12px !important;
    border-radius: 12px !important;
    font-size: 0.85em !important;
    line-height: 1 !important;
    margin: 0 !important;
  }
  @media (max-width: 640px){
    #top-nav-bar .btn-action{
      padding: 10px 14px !important;
      font-size: 0.9em !important;
    }
  }
</style>

</head>
<body>


<div id="top-nav-bar">
  <a id="btn-volver-menu" href="index.html" class="btn-action btn-blue" style="text-decoration:none; display:inline-block;">⬅ Regresar</a>
  <button id="btn-logout" class="btn-action btn-blue" style="display:none;" onclick="logout()">Cerrar sesión</button>
</div>
<div id="auth-screen">
    <div class="lock-box">
        <h1 style="margin: 0 0 15px 0; font-size: 3em;">🔐</h1>
        <h3 style="margin: 0 0 20px 0;">Iniciar sesión</h3>

        <input type="email" id="login-email" class="lock-input" placeholder="Correo..." autocomplete="username">
        <input type="password" id="login-pass" class="lock-input" placeholder="Contraseña..." autocomplete="current-password" onkeyup="verificarEnterLogin(event)">

        <br>
        <button onclick="login()" class="btn-action btn-green" style="width: 200px;">Entrar</button>

        <p id="login-msg" style="color: #ff7675; margin-top: 10px; display: none; font-weight: bold;"></p>

        <div style="margin-top: 20px;">
            <a href="index.html" style="color: #bdc3c7; text-decoration: none; font-size: 0.9em;">⬅ Volver al Menú</a>
        </div>
    </div>
</div>


<div class="container">
    <div id="area-label" class="area-indicator">Cargando área...</div>
    <h2>⚙️ Configurador Maestro</h2>
    
    <div class="tabs">
        <button class="tab active" onclick="switchTab('tab-preguntas')">📋 Preguntas</button>
        <button class="tab" onclick="switchTab('tab-bodegas')">📍 Ubicaciones/Unidad</button>
        <button class="tab" onclick="switchTab('tab-auditores')">👥 Auditores</button>
        <button class="tab" onclick="switchTab('tab-backup')">💾 CSV / Respaldo</button>
    </div>

    <div id="tab-preguntas" class="section active">
        <div class="resumen-puntos">
            <div style="flex: 1;"><strong>Total Puntos:</strong><div id="desglose-sumas" style="font-size: 0.75em; margin-top: 5px; color: #bdc3c7;">Calculando...</div></div>
            <div id="total-puntos" class="total-badge">0 / 100</div>
        </div>
        <div class="form-box" id="p-form-box">
            <div class="grid-3">
                <div><label>📂 Título Sección</label><input type="text" id="p-tit" placeholder="Ej: 1. Orden"></div>
                <div><label>📑 Cód.</label><input type="text" id="p-des" placeholder="Ej: 1.1"></div>
                <div><label>⚖️ Pts</label><input type="number" id="p-pts" value="10"></div>
                <div><label>🏢 Depto</label><select id="p-depto-filtro"><option value="TODOS">TODOS</option></select></div>
                <div class="full-width"><label>❓ Pregunta</label><textarea id="p-pre" rows="2"></textarea></div>
            </div>
            <button class="btn-action btn-green" id="btn-save-pregunta" onclick="guardarPregunta()">Guardar Pregunta</button>
            <button class="btn-action" id="btn-cancel-edit" style="display:none; background:#95a5a6;" onclick="resetForm('p')">Cancelar</button>
        </div>
        <div id="render-preguntas-acordeon"></div>
    </div>

    <div id="tab-bodegas" class="section">
        <div class="form-box" id="b-form-box">
            <div class="grid-3">
                <div><label>📍 Localización</label><input type="text" id="b-loc"></div>
                <div><label>🏢 Departamento</label><input type="text" id="b-dep"></div>
                <div><label>📦 Nombre</label><input type="text" id="b-nom"></div>
            </div>
            <button class="btn-action btn-green" id="btn-save-bodega" onclick="guardarBodega()">Registrar Ubicación/Unidad</button>
        </div>
        <div style="overflow-x: auto;">
            <table><thead><tr><th>Localización</th><th>Depto</th><th>Nombre</th><th class="col-actions">Acciones</th></tr></thead><tbody id="tbody-bodegas"></tbody></table>
        </div>
    </div>

    <div id="tab-auditores" class="section">
        <div class="form-box">
            <div class="grid-3">
                <div><label>👤 Nombre</label><input type="text" id="a-nom"></div>
                <div><label>💼 Puesto</label><input type="text" id="a-pue"></div>
            </div>
            <button class="btn-action btn-green" onclick="guardarAuditor()">Registrar Auditor</button>
        </div>
        <div style="overflow-x: auto;">
            <table><thead><tr><th>Nombre</th><th>Puesto</th><th class="col-actions">Acciones</th></tr></thead><tbody id="tbody-auditores"></tbody></table>
        </div>
    </div>

    <div id="tab-backup" class="section">
        <div class="form-box">
            <h3>Excel / CSV</h3>
            <button class="btn-action btn-outline" onclick="descargarDatosCSV()">📊 Bajar Datos CSV</button>
            <hr>
            <input type="file" id="csvFile" accept=".csv" style="margin-bottom:10px;">
            <button class="btn-action btn-orange" onclick="importarCSV()">📤 Subir CSV</button>
        </div>
        <div class="form-box">
            <h3>Respaldo JSON</h3>
            <button class="btn-action btn-blue" onclick="exportarDatos()">📥 Exportar JSON</button>
            <hr>
            <input type="file" id="jsonFile" accept=".json" style="margin-bottom:10px;">
            <button class="btn-action btn-green" onclick="importarJSON()">📥 Restaurar JSON</button>
        </div>
    </div>
</div>

<script>
    // --- LOGIN (SUPABASE AUTH) ---
    async function updateAuthUI() {
        const { data } = await _supabase.auth.getSession();
        const session = data?.session;

        const authScreen = document.getElementById('auth-screen');
        const logoutBtn = document.getElementById('btn-logout');

        if (session) {
            // Ocultar login
            authScreen.style.transition = "opacity 0.25s ease";
            authScreen.style.opacity = "0";
            setTimeout(() => { authScreen.style.display = "none"; }, 200);
            if (logoutBtn) logoutBtn.style.display = "inline-block";
            return true;
        } else {
            authScreen.style.display = "flex";
            authScreen.style.opacity = "1";
            if (logoutBtn) logoutBtn.style.display = "none";
            return false;
        }
    }

    async function login() {
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-pass').value;
        const msg = document.getElementById('login-msg');

        msg.style.display = "none";
        msg.innerText = "";

        if (!email || !password) {
            msg.innerText = "Captura correo y contraseña.";
            msg.style.display = "block";
            return;
        }

        const { error } = await _supabase.auth.signInWithPassword({ email, password });
        if (error) {
            console.error(error);
            msg.innerText = error.message || "No se pudo iniciar sesión.";
            msg.style.display = "block";
            return;
        }

        await updateAuthUI();
        // Cargar data ya logueado
        await initAfterAuth();
    }

    async function logout() {
        await _supabase.auth.signOut();
        await updateAuthUI();
    }

    function verificarEnterLogin(event) {
        if (event.key === "Enter") login();
    }
    // --------------------------------------


    
    _supabase.auth.onAuthStateChange(() => { updateAuthUI(); });
const getAreaURL = () => new URLSearchParams(window.location.search).get('tipo') || 'almacen';
    let editandoId = null;
    let departamentosUnicos = [];

    async function init() {
        // Primero, validar sesión
        const ok = await updateAuthUI();
        if (!ok) return;
        await initAfterAuth();
    }

    async function initAfterAuth() {
        // Link de regreso al menú por tipo
        try {
            const tipoArea = getAreaURL();
            const backBtn = document.getElementById('btn-volver-menu');
            if (backBtn) backBtn.href = `menu_area.html?tipo=${tipoArea}`;
        } catch(e) {}

        const tipoArea = getAreaURL();
        document.getElementById('area-label').innerText = `MODO: ${tipoArea.toUpperCase()}`;
        document.getElementById('btn-volver-menu').href = `menu_area.html?tipo=${tipoArea}`;
        const b2 = document.getElementById('btn-volver-menu2'); if (b2) b2.href = `menu_area.html?tipo=${tipoArea}`;
        await cargarBodegas();
        await cargarAuditores();
        cargarPreguntas();
    }

    function switchTab(id) {
        document.querySelectorAll('.section, .tab').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    async function cargarPreguntas() {
        const areaActual = getAreaURL();
        const { data, error } = await _supabase.from('configuracion_preguntas').select('*').eq('tipo', areaActual).eq('activo', true);
        if (error) { console.error(error); alert('Error cargando preguntas: ' + (error.message || error)); return; }
        if(!data) return;

        data.sort((a, b) => a.desglose.localeCompare(b.desglose, undefined, { numeric: true }));
        
        const container = document.getElementById('render-preguntas-acordeon');
        const resumen = document.getElementById('desglose-sumas');
        const badge = document.getElementById('total-puntos');
        
        let sumas = {}, total = 0;
        data.forEach(p => {
            let pts = parseFloat(p.ponderacion) || 0;
            sumas[p.titulo] = (sumas[p.titulo] || 0) + pts;
            total += pts;
        });

        badge.innerText = `${total.toFixed(1)} / 100`;
        badge.className = `total-badge ${total.toFixed(1) == 100.0 ? 'puntos-ok' : 'puntos-error'}`;
        resumen.innerText = Object.keys(sumas).map(t => `${t || 'SIN SECCIÓN'}: ${sumas[t].toFixed(1)}`).join(' | ');

        let html = '', cur = 'INICIO_NULO'; 
        data.forEach(p => {
            if (p.titulo !== cur) {
                if (cur !== 'INICIO_NULO') html += `</tbody></table></div>`;
                
                // MEJORA: Texto por defecto si el título está vacío
                const nombreMostrar = (p.titulo && p.titulo.trim() !== "") ? p.titulo : "SIN SECCIÓN";
                const ptsSeccion = sumas[p.titulo] ? sumas[p.titulo].toFixed(1) : "0.0";

                html += `<div class="seccion-header" onclick="this.nextElementSibling.classList.toggle('active')">
                            <span>${nombreMostrar} (${ptsSeccion} pts)</span>
                            <span>🔽</span>
                         </div>
                         <div class="seccion-contenido active">
                            <table>
                                <thead>
                                    <tr>
                                        <th width="15%">Cód</th>
                                        <th>Pregunta</th>
                                        <th class="col-pts">Pts</th>
                                        <th class="col-actions">Acciones</th>
                                    </tr>
                                </thead>
                                <tbody>`;
                cur = p.titulo;
            }
            html += `<tr>
                        <td><strong>${p.desglose}</strong></td>
                        <td>${p.pregunta}<br><span class="tag-depto">🏢 ${p.aplica_a_departamento || 'TODOS'}</span></td>
                        <td class="col-pts">${p.ponderacion}</td>
                        <td class="col-actions">
                            <button class="btn-icon edit-btn" onclick='prepararEdicionPregunta(${JSON.stringify(p)})'>✏️</button>
                            <button class="btn-icon del-btn" onclick="eliminarRegistro('configuracion_preguntas','${p.id}')">🗑️</button>
                        </td>
                    </tr>`;
        });
        container.innerHTML = html + (cur !== 'INICIO_NULO' ? `</tbody></table></div>` : '');
        actualizarMenuDepartamentos();
    }

    // Funciones de apoyo (Auditores, Bodegas, Reset, etc.)
    async function cargarAuditores() {
        const { data } = await _supabase.from('auditores').select('*').eq('activo', true).order('nombre');
        const tbody = document.getElementById('tbody-auditores');
        if (data) tbody.innerHTML = data.map(a => `<tr><td><strong>${a.nombre}</strong></td><td>${a.puesto}</td><td class="col-actions"><button class="btn-icon del-btn" onclick="eliminarRegistro('auditores','${a.id}')">🗑️</button></td></tr>`).join('');
    }

    async function guardarAuditor() {
        const nombre = document.getElementById('a-nom').value;
        const puesto = document.getElementById('a-pue').value;
        if(!nombre) return alert("Ingresa el nombre");
        await _supabase.from('auditores').insert([{ nombre, puesto, activo: true }]);
        resetForm('a'); cargarAuditores();
    }

    async function guardarPregunta() {
        const payload = { 
            titulo: document.getElementById('p-tit').value.trim(), 
            desglose: document.getElementById('p-des').value, 
            pregunta: document.getElementById('p-pre').value, 
            ponderacion: parseFloat(document.getElementById('p-pts').value), 
            tipo: getAreaURL(), 
            aplica_a_departamento: document.getElementById('p-depto-filtro').value,
            activo: true
        };
        if(editandoId) await _supabase.from('configuracion_preguntas').update(payload).eq('id', editandoId);
        else await _supabase.from('configuracion_preguntas').insert([payload]);
        resetForm('p'); cargarPreguntas();
    }

    function prepararEdicionPregunta(p) {
        document.getElementById('p-tit').value = p.titulo; 
        document.getElementById('p-des').value = p.desglose; 
        document.getElementById('p-pre').value = p.pregunta; 
        document.getElementById('p-pts').value = p.ponderacion; 
        document.getElementById('p-depto-filtro').value = p.aplica_a_departamento;
        editandoId = p.id; 
        document.getElementById('p-form-box').classList.add('form-editing'); 
        document.getElementById('btn-save-pregunta').innerText = "💾 Guardar Cambios"; 
        document.getElementById('btn-save-pregunta').className = "btn-action btn-orange"; 
        document.getElementById('btn-cancel-edit').style.display = "block";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function cargarBodegas() {
        const { data } = await _supabase.from('bodegas').select('*').eq('tipo', getAreaURL()).order('localizacion');
        if(!data) return;
        departamentosUnicos = [...new Set(data.map(b => b.departamento))].sort();
        document.getElementById('tbody-bodegas').innerHTML = data.map(b => `<tr><td>${b.localizacion}</td><td><strong>${b.departamento}</strong></td><td>${b.nombre}</td><td class="col-actions"><button class="btn-icon edit-btn" onclick='prepararEdicionBodega(${JSON.stringify(b)})'>✏️</button><button class="btn-icon del-btn" onclick="eliminarRegistro('bodegas','${b.id}')">🗑️</button></td></tr>`).join('');
        actualizarMenuDepartamentos();
    }

    async function guardarBodega() {
        const payload = { localizacion: document.getElementById('b-loc').value, departamento: document.getElementById('b-dep').value, nombre: document.getElementById('b-nom').value, tipo: getAreaURL() };
        if(editandoId) await _supabase.from('bodegas').update(payload).eq('id', editandoId);
        else await _supabase.from('bodegas').insert([payload]);
        resetForm('b'); cargarBodegas();
    }

    function prepararEdicionBodega(b) {
        document.getElementById('b-loc').value = b.localizacion; 
        document.getElementById('b-dep').value = b.departamento; 
        document.getElementById('b-nom').value = b.nombre;
        editandoId = b.id; 
        document.getElementById('b-form-box').classList.add('form-editing'); 
        document.getElementById('btn-save-bodega').innerText = "💾 Guardar Cambios"; 
        document.getElementById('btn-save-bodega').className = "btn-action btn-orange";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function actualizarMenuDepartamentos() {
        const select = document.getElementById('p-depto-filtro');
        const val = select.value;
        select.innerHTML = '<option value="TODOS">TODOS</option>' + departamentosUnicos.map(d => `<option value="${d}">${d}</option>`).join('');
        if (departamentosUnicos.includes(val)) select.value = val;
    }

    function resetForm(prefix) {
        editandoId = null;
        if(prefix==='p') { 
            document.getElementById('p-pre').value=''; document.getElementById('p-tit').value=''; document.getElementById('p-des').value=''; 
            document.getElementById('btn-save-pregunta').innerText="Guardar Pregunta"; 
            document.getElementById('btn-save-pregunta').className="btn-action btn-green";
            document.getElementById('p-form-box').classList.remove('form-editing');
            document.getElementById('btn-cancel-edit').style.display = "none";
        }
        if(prefix==='b') { 
            document.getElementById('b-loc').value=''; document.getElementById('b-dep').value=''; document.getElementById('b-nom').value=''; 
            document.getElementById('btn-save-bodega').innerText="Registrar Unidad";
            document.getElementById('btn-save-bodega').className="btn-action btn-green";
            document.getElementById('b-form-box').classList.remove('form-editing');
        }
        if(prefix==='a') { document.getElementById('a-nom').value=''; document.getElementById('a-pue').value=''; }
    }

    async function eliminarRegistro(tabla, id) {
        if (!confirm("¿Eliminar registro?")) return;

        try {
            // ✅ Preguntas: NO se borran físicamente para no romper historial -> se desactivan (soft delete)
            if (tabla === 'configuracion_preguntas') {
                const { error } = await _supabase
                    .from('configuracion_preguntas')
                    .update({ activo: false })
                    .eq('id', id);

                if (error) throw error;
                await cargarPreguntas();
                return;
            }

            // Otros catálogos: borrado normal
            const { error } = await _supabase.from(tabla).delete().eq('id', id);
            if (error) throw error;

            if (tabla === 'auditores') cargarAuditores();
            else if (tabla === 'bodegas') cargarBodegas();
            else cargarPreguntas();

        } catch (e) {
            console.error(e);
            const msg = (e && (e.message || e.details || e.hint)) ? (e.message || e.details || e.hint) : String(e);

            // Mensaje amigable para el caso típico (FK / conflicto)
            if (String(e?.code || '').includes('23503') || String(msg).toLowerCase().includes('foreign key') || String(msg).includes('409')) {
                alert("No se puede eliminar porque ya tiene registros relacionados (historial).\n\nEsta app ahora DESACTIVA preguntas en vez de borrarlas.\nSi sigues viendo este error, asegúrate de tener la columna 'activo' (boolean) en 'configuracion_preguntas'.");
            } else {
                alert("Error eliminando: " + msg);
            }
        }
    }

    // Funciones de Backup (Se mantienen iguales)
    async function descargarDatosCSV() {
        const area = getAreaURL();
        const { data: p } = await _supabase.from('configuracion_preguntas').select('titulo, desglose, pregunta, ponderacion, aplica_a_departamento').eq('tipo', area).eq('activo', true);
        const headers = "titulo,desglose,pregunta,ponderacion,aplica_a_departamento\n";
        const rows = p.map(p => [`"${p.titulo}"`, `"${p.desglose}"`, `"${p.pregunta}"`, p.ponderacion, `"${p.aplica_a_departamento}"`].join(",")).join("\n");
        const blob = new Blob(["\uFEFF" + headers + rows], { type: 'text/csv;charset=utf-8;' });
        const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `datos_${area}.csv`; a.click();
    }
// --- FUNCIÓN PARA IMPORTAR CSV ---
async function importarCSV() {
    const fileInput = document.getElementById('csvFile');
    const areaActual = getAreaURL();

    if (!fileInput.files.length) return alert("Por favor, selecciona un archivo CSV.");

    const file = fileInput.files[0];
    const reader = new FileReader();

    reader.onload = async (e) => {
        const text = e.target.result;
        // Dividir por líneas pero filtrar las vacías
        const rows = text.split(/\r?\n/).filter(line => line.trim() !== "").slice(1); 
        const nuevasPreguntas = [];

        rows.forEach((row, index) => {
            // EXPRESIÓN REGULAR MAESTRA: 
            // Divide por comas pero IGNORA las comas que están dentro de comillas ""
            const regex = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
            const cols = row.split(regex).map(c => c.replace(/^"|"$/g, '').trim());
            
            // Validamos que la fila tenga datos mínimos
            if (cols.length >= 4 && cols[2]) { 
                nuevasPreguntas.push({
                    titulo: cols[0],
                    desglose: cols[1],
                    pregunta: cols[2],
                    ponderacion: parseFloat(cols[3]) || 0,
                    aplica_a_departamento: cols[4] || 'TODOS',
                    tipo: areaActual,
                    activo: true
                });
            } else {
                console.warn(`Fila ${index + 2} omitida por formato incorrecto:`, cols);
            }
        });

        if (nuevasPreguntas.length === 0) {
            return alert("No se encontraron datos válidos. Revisa que el formato sea: titulo, desglose, pregunta, ponderacion, aplica_a_departamento");
        }

        if (confirm(`Se detectaron ${nuevasPreguntas.length} preguntas. ¿Deseas subirlas a ${areaActual}?`)) {
            const { error } = await _supabase.from('configuracion_preguntas').insert(nuevasPreguntas);
            if (error) {
                alert("Error de Supabase: " + error.message);
            } else {
                alert("✅ ¡Importación exitosa!");
                cargarPreguntas();
                fileInput.value = ""; // Limpiar input
            }
        }
    };
    // Usamos UTF-8 para asegurar que los acentos y la "ñ" se vean bien
    reader.readAsText(file, 'UTF-8');
}

// --- FUNCIÓN PARA EXPORTAR TODO EL SISTEMA (JSON) ---
async function exportarDatos() {
    const area = getAreaURL();
    const { data: p } = await _supabase.from('configuracion_preguntas').select('*').eq('tipo', area);
    const { data: b } = await _supabase.from('bodegas').select('*').eq('tipo', area);
    const { data: a } = await _supabase.from('auditores').select('*');

    const backup = { area, preguntas: p, bodegas: b, auditores: a, fecha: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = `backup_${area}_${new Date().toLocaleDateString()}.json`;
    link.click();
}

// --- FUNCIÓN PARA RESTAURAR RESPALDO (JSON) ---
async function importarJSON() {
    const fileInput = document.getElementById('jsonFile');
    if (!fileInput.files.length) return alert("Selecciona un archivo .json");

    const file = fileInput.files[0];
    const reader = new FileReader();
    reader.onload = async (e) => {
        try {
            const data = JSON.parse(e.target.result);
            if (confirm("¿Restaurar respaldo? Esto podría duplicar datos si ya existen.")) {
                if (data.preguntas) await _supabase.from('configuracion_preguntas').insert(data.preguntas.map(({id, ...rest}) => rest));
                if (data.bodegas) await _supabase.from('bodegas').insert(data.bodegas.map(({id, ...rest}) => rest));
                alert("✅ Restauración completada.");
                location.reload();
            }
        } catch (err) { alert("Error al leer JSON: " + err.message); }
    };
    reader.readAsText(file);
}
